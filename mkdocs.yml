    - "12. 消除队头阻塞: Stream 状态机精解": 04_flow_and_stream/stream_state_machine.md
  - "卷五: 抵达彼岸 (HTTP/3 与应用层)":
    - "13. 重新映射: 从 QUIC 流到 Request/Response": 05_application/http3_mapping.md
    - "14. QPACK: 头压缩引擎与状态挂钩": 05_application/qpack_compression.md
  - "卷六: 生产级修养":
    - "15. 黑暗中的灯塔: 无侵入式上下文追踪": 06_engineering/log_context_guard.md
    - "16. 试炼场: 与 Nginx/Quiche 的互联互通": 06_engineering/interop_test.md
  - "附录篇":
    - "深入剖析网络IO复用": articles/深入​剖析网络IO复用.md
    - "什么是面向对象编程": articles/什么是面向对象编程.md
