site_name: 深入解析 QUIC 与 HTTP/3
site_description: 从协议设计到 quicX 网络库实践
site_author: ekko

theme:
  name: material
  language: zh
  palette:
    # 浅色模式切换
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 切换到暗黑模式
    # 暗黑模式切换
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式
  features:
    - navigation.sections # 左侧边栏分组显示并支持折叠/展开
    - navigation.top # 返回顶部按钮
    - navigation.footer # 底部翻页组件
    - content.code.copy # 代码块复制按钮
    - content.code.annotate # 代码交互注释

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - pymdownx.details
  - attr_list

nav:
  - 序言: index.md
  - "卷一: 基石时代 (基础设施)":
    - "1. 内存的七巧板: 内存池的设计": 01_infrastructure/memory_pool.md
    - "2. 拷贝的艺术: 零拷贝 Buffer 的生存哲学": 01_infrastructure/zero_copy_buffer.md
    - "3. 管道与枢纽: 网络 IO 的架构抽象": 01_infrastructure/network_io_abstraction.md
    - "4. 打破全局锁: One-Loop-Per-Thread 的无锁演进": 01_infrastructure/thread_model_and_lockfree.md
    - "5. 时空的刻度: 高效定时器与事件循环的融合": 01_infrastructure/async_timer.md
  - "卷二: 破冰之旅 (连接与握手)":
    - "6. 护城河: 报文的首部与地址验证": 02_connection/initial_and_token.md
    - "7. 解密迷宫: TLS 1.3 融合纪实": 02_connection/tls_and_decrypt.md
  - "卷三: 生死契约 (发送管线与可靠性)":
    - "8. 抽丝剥茧: Sender 下沉重构": 03_pipeline/sender_downshift.md
    - "9. 隔离与承诺: 序列号空间与 Immediate ACK": 03_pipeline/pn_space_and_ack.md
    - "10. 迷失与重生: 丢包探测与定时器幽灵": 03_pipeline/loss_detection_and_ptr.md
  - "卷四: 秩序与抽象 (并发与流控)":
