site_name: 深入解析 QUIC 与 HTTP/3
site_description: 从协议设计到 quicX 网络库实践
site_author: ekko

theme:
  name: material
  language: zh
  palette:
    # 浅色模式切换
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 切换到暗黑模式
    # 暗黑模式切换
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式
  features:
    - navigation.sections # 左侧边栏分组显示并支持折叠/展开
    - navigation.top # 返回顶部按钮
    - navigation.footer # 底部翻页组件
    - content.code.copy # 代码块复制按钮
    - content.code.annotate # 代码交互注释

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - pymdownx.details
  - attr_list

