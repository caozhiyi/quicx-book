<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" width="100%" height="100%">
    <defs>
        <linearGradient id="arrayBg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#2c3e50" />
            <stop offset="100%" stop-color="#34495e" />
        </linearGradient>
        <linearGradient id="nodeBg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0062cc" />
            <stop offset="100%" stop-color="#0056b3" />
        </linearGradient>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#1e1e1e" />
            <stop offset="100%" stop-color="#252526" />
        </linearGradient>
        <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
            <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.4"/>
        </filter>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#888" />
        </marker>
    </defs>
    <style>
        .title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 18px; fill: #e5e5e5; font-weight: 600; }
        .arr-text { font-family: ui-monospace, SFMono-Regular, Monaco, Consolas, monospace; font-size: 14px; fill: #ffffff; font-weight: bold;}
        .node-text { font-family: ui-monospace, SFMono-Regular, Monaco, Consolas, monospace; font-size: 13px; fill: #ffffff; }
        .label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 14px; fill: #999; }
    </style>
    
    <rect width="100%" height="100%" fill="url(#bg)" rx="8"/>
    <text x="40" y="40" class="title">内存分块矩阵 (Memory Block Matrix)</text>
    
    <!-- Row 1 -->
    <rect x="40" y="80" width="130" height="40" rx="4" fill="url(#arrayBg)" filter="url(#shadow)"/>
    <text x="50" y="105" class="arr-text">[0] 8 Bytes</text>
    <line x1="170" y1="100" x2="230" y2="100" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>
    
    <rect x="240" y="80" width="90" height="40" rx="4" fill="url(#nodeBg)" filter="url(#shadow)"/>
    <text x="250" y="105" class="node-text">MemNode</text>
    <line x1="330" y1="100" x2="390" y2="100" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>
    
    <rect x="400" y="80" width="90" height="40" rx="4" fill="url(#nodeBg)" filter="url(#shadow)"/>
    <text x="410" y="105" class="node-text">MemNode</text>
    <line x1="490" y1="100" x2="550" y2="100" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>
    
    <rect x="560" y="80" width="90" height="40" rx="4" fill="url(#nodeBg)" filter="url(#shadow)"/>
    <text x="570" y="105" class="node-text">MemNode</text>
    <text x="670" y="105" class="node-text" fill="#888">...</text>

    <!-- Row 2 -->
    <rect x="40" y="140" width="130" height="40" rx="4" fill="url(#arrayBg)" filter="url(#shadow)"/>
    <text x="50" y="165" class="arr-text">[1] 16 Bytes</text>
    <line x1="170" y1="160" x2="230" y2="160" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>
    
    <rect x="240" y="140" width="90" height="40" rx="4" fill="url(#nodeBg)" filter="url(#shadow)"/>
    <text x="250" y="165" class="node-text">MemNode</text>
    <line x1="330" y1="160" x2="390" y2="160" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>
    
    <rect x="400" y="140" width="90" height="40" rx="4" fill="url(#arrayBg)" filter="url(#shadow)"/>
    <text x="425" y="165" class="node-text" fill="#ccc">NULL</text>

    <!-- Row 3 -->
    <rect x="40" y="200" width="130" height="40" rx="4" fill="url(#arrayBg)" filter="url(#shadow)"/>
    <text x="50" y="225" class="arr-text">[2] 24 Bytes</text>
    <line x1="170" y1="220" x2="230" y2="220" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>
    
    <rect x="240" y="200" width="90" height="40" rx="4" fill="url(#nodeBg)" filter="url(#shadow)"/>
    <text x="250" y="225" class="node-text">MemNode</text>

    <!-- Dots -->
    <circle cx="105" cy="270" r="3" fill="#888"/>
    <circle cx="105" cy="285" r="3" fill="#888"/>
    <circle cx="105" cy="300" r="3" fill="#888"/>

    <!-- Row 16 -->
    <rect x="40" y="320" width="130" height="40" rx="4" fill="url(#arrayBg)" filter="url(#shadow)"/>
    <text x="50" y="345" class="arr-text">[15] 128 Bytes</text>
    <line x1="170" y1="340" x2="230" y2="340" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>
    
    <rect x="240" y="320" width="90" height="40" rx="4" fill="url(#nodeBg)" filter="url(#shadow)"/>
    <text x="250" y="345" class="node-text">MemNode</text>

    <text x="240" y="55" class="label">空闲链表 (Free List)</text>
</svg>
