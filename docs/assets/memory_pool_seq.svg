<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
    <defs>
        <linearGradient id="primary" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0984e3" />
            <stop offset="100%" stop-color="#74b9ff" />
        </linearGradient>
        <linearGradient id="secondary" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#2d3436" />
            <stop offset="100%" stop-color="#636e72" />
        </linearGradient>
        <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#d63031" />
            <stop offset="100%" stop-color="#ff7675" />
        </linearGradient>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#212529" />
            <stop offset="100%" stop-color="#343a40" />
        </linearGradient>
        <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
            <feDropShadow dx="3" dy="5" stdDeviation="4" flood-opacity="0.5"/>
        </filter>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#b2bec3" />
        </marker>
        <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#00b894" />
        </marker>
        <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#d63031" />
        </marker>
    </defs>
    <style>
        .title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 20px; fill: #fdfdfd; font-weight: bold; }
        .box-text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 16px; fill: #ffffff; font-weight: 600; text-anchor: middle;}
        .sm-text { font-family: ui-monospace, Monaco, Consolas, monospace; font-size: 13px; fill: #ffeaa7; text-anchor: middle;}
        .edge-label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 14px; font-weight: bold;}
    </style>
    
    <rect width="100%" height="100%" fill="url(#bg)" rx="8"/>
    <text x="40" y="40" class="title">内存分配逻辑流转图 (Allocation Flow)</text>

    <!-- App Node -->
    <rect x="300" y="70" width="200" height="50" rx="6" fill="url(#secondary)" filter="url(#shadow)"/>
    <text x="400" y="100" class="box-text">App层请求: 12 Bytes</text>
    <line x1="400" y1="120" x2="400" y2="160" stroke="#b2bec3" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- RoundUp Node -->
    <rect x="250" y="160" width="300" height="60" rx="6" fill="#0984e3" filter="url(#shadow)"/>
    <text x="400" y="185" class="box-text">快如闪电的位运算: RoundUp(12)</text>
    <text x="400" y="205" class="sm-text">Size: 16 Bytes (对应链表 Index: 1)</text>
    <line x1="400" y1="220" x2="400" y2="260" stroke="#b2bec3" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- Condition Node -->
    <polygon points="400,260 510,300 400,340 290,300" fill="url(#secondary)" filter="url(#shadow)"/>
    <text x="400" y="305" class="box-text">Index 1 链表有空闲?</text>

    <!-- Branch YES -->
    <line x1="510" y1="300" x2="620" y2="300" stroke="#00b894" stroke-width="3" marker-end="url(#arrow-green)"/>
    <text x="560" y="290" class="edge-label" fill="#00b894">YES</text>
    <rect x="620" y="270" width="140" height="60" rx="6" fill="#00b894" filter="url(#shadow)"/>
    <text x="690" y="295" class="box-text">O(1) 摘取链表头</text>
    <text x="690" y="315" class="sm-text">极速返回应用层</text>

    <!-- Branch NO -->
    <line x1="400" y1="340" x2="400" y2="400" stroke="#d63031" stroke-width="3" marker-end="url(#arrow-red)"/>
    <text x="410" y="375" class="edge-label" fill="#d63031">NO (链表空了)</text>
    
    <!-- OS Node (ReFill) -->
    <rect x="250" y="400" width="300" height="60" rx="6" fill="url(#accent)" filter="url(#shadow)"/>
    <text x="400" y="425" class="box-text">触碰系统内核 API (Trigger OS alloc)</text>
    <text x="400" y="445" class="sm-text">批发申请大块内存 -> 切割并串联入池</text>

    <!-- Back edge to return -->
    <path d="M 550 430 Q 690 430 690 340" fill="none" stroke="#b2bec3" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
